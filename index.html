<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하맘 매물지도 PRO+</title>
    <!-- 리플렛(Leaflet) 지도 CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <style>
        /* 기본 리셋 및 레이아웃 설정 */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            height: 100vh; 
            background: #f0f2f5; 
            overflow: hidden;
        }

        /* 왼쪽 사이드바 영역 */
        .sidebar { 
            width: 380px; 
            min-width: 380px;
            background: white; 
            border-right: 1px solid #ccc; 
            display: flex; 
            flex-direction: column; 
            z-index: 1000;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        /* 사이드바 헤더 (하맘 브랜딩) */
        .header { padding: 25px; border-bottom: 2px solid #f0f2f5; background: #fff; }
        .header h1 { margin: 0; font-size: 24px; color: #2563eb; display: flex; align-items: center; gap: 8px;}
        
        /* 버튼 디자인 (하맘 블루) */
        .btn { 
            display: block; 
            width: 100%; 
            text-align: center; 
            padding: 14px; 
            background: #2563eb; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            margin-top: 20px; 
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn:hover { background: #1d4ed8; transform: translateY(-2px); }

        /* 중개인 / 고객 권한 탭 */
        .tabs { display: flex; padding: 10px; background: #f8fafc; border-bottom: 1px solid #eee; }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; border-radius: 8px; font-weight: bold; color: #64748b; font-size: 14px; transition: 0.2s;}
        .tab.active { background: #2563eb; color: white; display: block; }
        .tab:hover { background: #eff6ff; }

        /* 매물 리스트 영역 */
        .list { flex: 1; overflow-y: auto; padding: 20px; background: #fafafa; }
        .item { 
            padding: 18px; 
            border: 1px solid #e2e8f0; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.3s;
            background: #fff;
            position: relative;
        }
        .item:hover { border-color: #2563eb; box-shadow: 0 8px 15px rgba(37, 99, 235, 0.1); transform: translateY(-3px); }
        .item-img { width: 100%; height: 120px; border-radius: 8px; background-size: cover; background-position: center; margin-bottom: 12px; }
        .item-title { font-weight: bold; font-size: 17px; margin-bottom: 6px; color: #1e293b; }
        .item-price { color: #2563eb; font-weight: bold; font-size: 20px; }
        .item-desc { font-size: 14px; color: #64748b; margin-top: 10px; line-height: 1.4; }

        /* 하단 푸터 (문의번호) */
        .sidebar-footer {
            padding: 20px;
            background: #f8fafc;
            border-top: 1px solid #eee;
            font-size: 15px;
            color: #1e293b;
            text-align: center;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* 오른쪽 지도 영역 */
        .map-container { flex: 1; position: relative; background: #e5e7eb; min-height: 100vh; }
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        /* GPS 플로팅 버튼 (하맘 전용) */
        .gps-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 55px;
            height: 55px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            cursor: pointer;
            z-index: 1001;
            border: 3px solid #2563eb;
            font-size: 24px;
            transition: 0.2s;
        }
        .gps-btn:hover { background: #f1f5f9; transform: scale(1.1); }

        /* 네비게이션 팝업 디자인 */
        .nav-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .nav-btn { 
            padding: 10px; 
            font-size: 13px; 
            text-decoration: none; 
            color: white !important; 
            border-radius: 6px; 
            text-align: center;
            font-weight: bold;
            transition: 0.2s;
        }
        .nav-naver { background: #03c75a; }
        .nav-kakao { background: #fee500; color: #3c1e1e !important; }
        .nav-tmap { background: #ff4500; font-size: 14px;}
        .nav-btn:hover { filter: brightness(0.9); }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; min-width: 100%; height: 45vh; border-right: none; border-bottom: 1px solid #ccc; }
            .map-container { height: 55vh; flex: none; }
        }
    </style>
    <!-- 리플렛(Leaflet) 지도 JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
</head>
<body>

    <!-- 왼쪽 사이드바 -->
    <div class="sidebar">
        <div class="header">
            <h1>📍 하맘 매물지도 PRO+</h1>
            <p style="margin: 5px 0 0 0; color: #64748b; font-size: 14px;">실시간 부동산 매물 통합 관리</p>
            <button class="btn" id="addBtn">+ 현재 위치에 매물 등록</button>
        </div>
        
        <div class="tabs">
            <div class="tab active" id="tabBroker">중개인 전용</div>
            <div class="tab" id="tabClient">고객 열람 모드</div>
        </div>

        <div class="list" id="propertyList">
            <!-- 자바스크립트를 통해 매물 리스트 및 사진이 표시됩니다 -->
        </div>

        <div class="sidebar-footer">
            저작권/문의 : 1660-1195
        </div>
    </div>

    <!-- 오른쪽 지도 -->
    <div class="map-container">
        <div id="map"></div>
        <div class="gps-btn" id="gpsBtn" title="내 위치 찾기">📍</div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 매물 데이터
            let properties = [
                { id: 101, title: '용산구 한남동 프리미엄 빌라', price: '매매 45억', lat: 37.5342, lng: 127.0012, desc: '나인원 한남 인근 고급 거주지', img: 'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=400&q=80' },
                { id: 102, title: '마포구 서교동 카페 상가', price: '월세 5000 / 350', lat: 37.5512, lng: 126.9212, desc: '홍대 메인 거리 목 좋은 상가', img: 'https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&w=400&q=80' },
                { id: 103, title: '영등포구 여의도동 고층 오피스텔', price: '전세 8.5억', lat: 37.5252, lng: 126.9242, desc: '더현대 서울 도보권 직주근접', img: 'https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=400&q=80' },
                { id: 104, title: '성동구 성수동 지식산업센터', price: '매매 12억', lat: 37.5442, lng: 127.0512, desc: '성수역 인근 리모델링 완료', img: 'https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=400&q=80' },
                { id: 105, title: '강서구 마곡동 신축 아파트', price: '전세 6.2억', lat: 37.5592, lng: 126.8312, desc: 'LG 사이언스파크 인근 주거 단지', img: 'https://images.unsplash.com/photo-1484154218962-a197022b5858?auto=format&fit=crop&w=400&q=80' },
                { id: 1, title: '강남구 역삼동 오피스텔', price: '월세 1000 / 120', lat: 37.4980, lng: 127.0276, desc: '강남역 도보 5분 거리 신축급', img: 'https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?auto=format&fit=crop&w=400&q=80' },
                { id: 2, title: '서초구 반포동 아파트', price: '매매 32억', lat: 37.5012, lng: 127.0012, desc: '리모델링 완료된 한강 생활권', img: 'https://images.unsplash.com/photo-1460317442991-0ec239fe326a?auto=format&fit=crop&w=400&q=80' },
                { id: 3, title: '송파구 잠실동 신축 빌라', price: '전세 4.5억', lat: 37.5133, lng: 127.1001, desc: '9호선 삼전역 도보 조용한 단지', img: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=400&q=80' }
            ];

            const listEl = document.getElementById('propertyList');
            let map;
            let markers = [];

            function renderAll() {
                listEl.innerHTML = '';
                markers.forEach(m => map.removeLayer(m));
                markers = [];

                properties.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'item';
                    div.innerHTML = `
                        <div class="item-img" style="background-image: url('${p.img}')"></div>
                        <div class="item-price">${p.price}</div>
                        <div class="item-title">${p.title}</div>
                        <div class="item-desc">${p.desc}</div>
                    `;
                    div.onclick = () => { if(map) map.setView([p.lat, p.lng], 16); };
                    listEl.appendChild(div);

                    const marker = L.marker([p.lat, p.lng]).addTo(map);
                    
                    const nv = `https://map.naver.com/v5/directions/-/lat,lng,name/-/`.replace('lat,lng,name', `${p.lat},${p.lng},${p.title}`);
                    const kk = `https://map.kakao.com/link/to/${p.title},${p.lat},${p.lng}`;
                    const tm = `https://apis.openapi.sk.com/tmap/app/routes?appKey=test&name=${p.title}&lon=${p.lng}&lat=${p.lat}`;

                    const popupHtml = `
                        <div style="width:220px;">
                            <img src="${p.img}" style="width:100%; height:120px; border-radius:6px; object-fit:cover; margin-bottom:10px;">
                            <strong style="color:#2563eb; font-size:18px;">${p.price}</strong><br>${p.title}
                            <div class="nav-btns">
                                <a href="${nv}" target="_blank" class="nav-btn nav-naver">네이버</a>
                                <a href="${kk}" target="_blank" class="nav-btn nav-kakao">카카오</a>
                                <a href="${tm}" target="_blank" class="nav-btn nav-tmap" style="grid-column: span 2;">티맵(T-Map) 길안내</a>
                            </div>
                        </div>
                    `;
                    marker.bindPopup(popupHtml);
                    markers.push(marker);
                });
            }

            function initMap() {
                try {
                    map = L.map('map', { zoomControl: false }).setView([37.525, 126.985], 12);
                    
                    // 차단 걱정 없는 CartoDB Voyager 서버 사용 (로컬 파일에서도 100% 나옴)
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
                    }).addTo(map);

                    renderAll();
                } catch (e) {
                    console.error("실행 오류:", e);
                }
            }

            function initUI() {
                const addBtn = document.getElementById('addBtn');
                const gpsBtn = document.getElementById('gpsBtn');
                const tB = document.getElementById('tabBroker');
                const tC = document.getElementById('tabClient');

                tB.onclick = () => {
                    if(prompt("중개인 인증 비밀번호(1191004)를 입력하세요.") === "1191004") {
                        tB.classList.add('active'); tC.classList.remove('active'); addBtn.style.display = 'block';
                    } else alert("비밀번호 불일치");
                };

                tC.onclick = () => {
                    tC.classList.add('active'); tB.classList.remove('active'); addBtn.style.display = 'none';
                };

                addBtn.onclick = () => {
                    const title = prompt("매물 제목?");
                    const price = prompt("가격?");
                    if(title && price) {
                        properties.unshift({
                            id: Date.now(), title: title, price: price, 
                            lat: map.getCenter().lat, lng: map.getCenter().lng,
                            desc: '하맘 매물지도 신규 매물', img: 'https://images.unsplash.com/photo-1480074568708-e7b720bb3f09?auto=format&fit=crop&w=400&q=80'
                        });
                        renderAll();
                    }
                };

                gpsBtn.onclick = () => {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition((pos) => {
                            map.setView([pos.coords.latitude, pos.coords.longitude], 16);
                            L.circle([pos.coords.latitude, pos.coords.longitude], { radius: 100, color: '#2563eb' }).addTo(map);
                        });
                    }
                };
            }

            initMap();
            initUI();
        });
    </script>
</body>
</html>
